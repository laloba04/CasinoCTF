<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring glow -->
  <rect x="12" y="12" width="488" height="488" rx="84" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.5"/>
  <!-- Casino chip -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#accent)" stroke-width="10"/>
  <circle cx="256" cy="256" r="152" fill="url(#accent)" opacity="0.12"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
  <!-- Chip notches top/bottom/left/right -->
  <rect x="226" y="64" width="60" height="22" rx="6" fill="url(#accent)"/>
  <rect x="226" y="426" width="60" height="22" rx="6" fill="url(#accent)"/>
  <rect x="64" y="226" width="22" height="60" rx="6" fill="url(#accent)"/>
  <rect x="426" y="226" width="22" height="60" rx="6" fill="url(#accent)"/>
  <!-- Diagonal notches -->
  <rect x="108" y="90" width="60" height="22" rx="6" fill="url(#accent)" transform="rotate(45 138 101)"/>
  <rect x="344" y="90" width="60" height="22" rx="6" fill="url(#accent)" transform="rotate(-45 374 101)"/>
  <rect x="108" y="400" width="60" height="22" rx="6" fill="url(#accent)" transform="rotate(-45 138 411)"/>
  <rect x="344" y="400" width="60" height="22" rx="6" fill="url(#accent)" transform="rotate(45 374 411)"/>
  <!-- Center: Playing card suit symbols -->
  <text x="180" y="230" font-family="serif" font-size="60" text-anchor="middle" fill="#ef4444" opacity="0.9">♥</text>
  <text x="332" y="230" font-family="serif" font-size="60" text-anchor="middle" fill="#1e293b" opacity="0.9" stroke="#94a3b8" stroke-width="1">♠</text>
  <text x="180" y="310" font-family="serif" font-size="60" text-anchor="middle" fill="#ef4444" opacity="0.9">♦</text>
  <text x="332" y="310" font-family="serif" font-size="60" text-anchor="middle" fill="#1e293b" opacity="0.9" stroke="#94a3b8" stroke-width="1">♣</text>
  <!-- CTF label -->
  <text x="256" y="278" font-family="sans-serif" font-size="52" font-weight="900" text-anchor="middle" fill="url(#gold)" letter-spacing="4">CTF</text>
</svg>
